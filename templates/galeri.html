{% extends "layout.html" %}
{% block content %}
<div class="container my-5">
    <h2 class="section-title">Galeri Kegiatan</h2>
    <div class="row">
        {% for photo in photos %}
        <div class="col-md-3 mb-4 gallery-item">
            <img src="{{ url_for('static', filename='uploads/' + photo.image) }}" data-bs-toggle="modal" data-bs-target="#modal{{ photo.id }}">
            <p class="text-center mt-2 fw-bold">{{ photo.title }}</p>
        </div>

        <div class="modal fade" id="modal{{ photo.id }}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">{{ photo.title }}</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body text-center">
                        <img src="{{ url_for('static', filename='uploads/' + photo.image) }}" class="img-fluid">
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
