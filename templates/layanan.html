{% extends "layout.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
    /* Memastikan List Angka (OL) dan List Titik (UL) muncul dengan rapi */
    .service-content ul, .service-content ol {
        margin-left: 20px;
        padding-left: 20px;
        margin-bottom: 1rem;
    }
    .service-content li {
        margin-bottom: 5px;
    }
    .service-content p {
        margin-bottom: 10px;
        line-height: 1.6;
        text-align: justify; /* Agar teks paragraf rata kiri-kanan */
    }
</style>

<div class="container my-5">
    <div class="text-center mb-5">
        <h2 class="fw-bold">Layanan Rutan Kelas IIB Pangkalan Brandan</h2>
        <hr class="mx-auto" style="width: 100px; height: 3px; background-color: #0d6efd; opacity: 1;">
    </div>

    <div class="row">
        {% for serv in services %}
        <div class="col-12 mb-5">
            <div class="shadow rounded overflow-hidden border-0">
                <div class="p-3 text-white d-flex align-items-center" style="background-color: #1b6ec2;">
                    <i class="bi bi-geo-alt-fill me-2 fs-4"></i>
                    <h4 class="m-0 fw-bold">{{ serv.title }}</h4>
                </div>
                
                <div class="bg-white p-4 service-content">
                    {{ serv.description | safe }}

                    {% if serv.file %}
                    <div class="mt-4 pt-3 border-top">
                        <a href="{{ url_for('static', filename='uploads/' + serv.file) }}" target="_blank" class="btn btn-danger btn-sm">
                            <i class="bi bi-file-earmark-pdf-fill"></i> Download Surat Jaminan (PDF)
                        </a>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
        {% else %}
        <div class="col-12 text-center">
            <p>Belum ada informasi layanan.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
